<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFE & BAR Twilight - HOME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">

    <!-- ヘッダー（全ページ共通） -->
    <header>
        <div class="logo">
            <a href="index.html">CAFE & BAR Twilight</a>
        </div>
        <input type="checkbox" id="menu-toggle-checkbox" class="menu-checkbox" aria-controls="main-navigation" aria-expanded="false">
        <button type="button" class="menu-toggle" aria-controls="main-navigation" aria-label="メニューを開く" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="main-navigation" aria-label="Main navigation">
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="concept.html">CONCEPT</a></li>
                <li><a href="menu-day.html">MENU</a></li>
                <li><a href="event.html">EVENTS & SPACE</a></li>
                <li><a href="access.html">ACCESS</a></li>
            </ul>
        </nav>
    </header>

    <!-- ① ヘッダー直下に表示する画像エリア（文字を置かない） -->
    <section class="hero-image-area">
        <picture>
            <source media="(max-width:768px)" srcset="image/smartHeader.png">
            <source media="(min-width:769px)" srcset="image/Header.png">
            <img src="image/Header.png" alt="CAFE & BAR Twilight" class="hero-image" loading="eager" decoding="sync">
        </picture>
    </section>

    <!-- ② スクロールすると現れる、文章やボタンのエリア -->
    <section class="hero-content-area">
        <h1>昼は珈琲、夜は音楽と酒と。</h1>
        <p>入口正面のカウンターと、左手に広がるピアノのステージ。大人のための隠れ家へようこそ。</p>
        
        <div class="home-links">
            <a href="concept.html" class="btn">コンセプトを見る</a>
            <a href="menu-day.html" class="btn">メニューを見る</a>
            <a href="event.html" class="btn">イベントスケジュールを見る</a>
            <a href="access.html" class="btn">アクセス・詳細を見る</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 CAFE & BAR Twilight All Rights Reserved.</p>
    </footer>

    <script>
        (function(){
            const menuCheckbox = document.getElementById('menu-toggle-checkbox');
            const menuToggleLabel = document.querySelector('.menu-toggle');
            const mainNav = document.getElementById('main-navigation');
            if (!menuCheckbox) return;
            function updateMenuAria(){
                const opened = menuCheckbox.checked;
                menuToggleLabel.setAttribute('aria-expanded', opened ? 'true' : 'false');
                menuCheckbox.setAttribute('aria-expanded', opened ? 'true' : 'false');
            }
            menuCheckbox.addEventListener('change', updateMenuAria);
            menuToggleLabel.addEventListener('click', () => {
                menuCheckbox.checked = !menuCheckbox.checked;
                menuCheckbox.dispatchEvent(new Event('change'));
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { menuCheckbox.checked = false; updateMenuAria(); }});
            document.addEventListener('click', (e) => { if (menuCheckbox.checked && !mainNav.contains(e.target) && !menuToggleLabel.contains(e.target)) { menuCheckbox.checked = false; updateMenuAria(); }});
        })();
    </script>

</body>
</html>
